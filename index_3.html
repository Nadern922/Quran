<style>
  :root{
    --night:#0d2b28;
    --night-2:#123936;
    --panel:#153f3c;
    --gold:#cc9a3f;
    --gold-soft:#e0b869;
    --cream:#f4ecd8;
    --muted:#8fb0a9;
    --line:rgba(224,184,105,0.18);
    --danger:#c1543f;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Tajawal', sans-serif;
    background:
      radial-gradient(circle at 15% 8%, rgba(224,184,105,0.08), transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(224,184,105,0.06), transparent 45%),
      var(--night);
    color:var(--cream);
    min-height:100%;
    padding-bottom:110px;
    padding-top:env(safe-area-inset-top);
  }

  /* geometric star pattern overlay */
  .pattern-bg{
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.05;
    background-image:
      repeating-linear-gradient(45deg, var(--gold-soft) 0 1px, transparent 1px 40px),
      repeating-linear-gradient(-45deg, var(--gold-soft) 0 1px, transparent 1px 40px);
  }

  .wrap{position:relative; z-index:1; max-width:640px; margin:0 auto; padding:28px 18px 0;}

  header.top{
    text-align:center; margin-bottom:22px;
  }
  header.top .crescent{
    width:46px; height:46px; margin:0 auto 8px;
  }
  header.top h1{
    font-family:'Amiri', serif;
    font-weight:700;
    font-size:1.9rem;
    color:var(--gold-soft);
    letter-spacing:0.5px;
  }
  header.top p{
    color:var(--muted);
    font-size:0.85rem;
    margin-top:4px;
  }

  .divider{
    display:flex; align-items:center; gap:10px; margin:26px 0 18px; opacity:0.85;
  }
  .divider .l{flex:1; height:1px; background:linear-gradient(to left, var(--line), transparent);}
  .divider .r{flex:1; height:1px; background:linear-gradient(to right, var(--line), transparent);}
  .divider svg{width:20px; height:20px; opacity:0.8;}

  /* prayer card */
  .card{
    background:linear-gradient(180deg, var(--panel), var(--night-2));
    border:1px solid var(--line);
    border-radius:18px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
  }
  .loc-row{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;
    font-size:0.85rem; color:var(--muted);
  }
  .loc-row .city{color:var(--gold-soft); font-weight:700;}
  .loc-row button{
    background:none; border:1px solid var(--line); color:var(--muted);
    padding:5px 10px; border-radius:8px; font-family:inherit; font-size:0.75rem; cursor:pointer;
  }
  .loc-row button:hover{color:var(--gold-soft); border-color:var(--gold-soft);}

  .hijri-date{ text-align:center; color:var(--muted); font-size:0.8rem; margin-bottom:16px;}

  .next-prayer{
    text-align:center; padding:14px 10px 18px;
    border-bottom:1px dashed var(--line);
    margin-bottom:16px;
  }
  .next-prayer .lbl{font-size:0.75rem; color:var(--muted); letter-spacing:1px;}
  .next-prayer .name{
    font-family:'Amiri', serif; font-size:1.6rem; color:var(--gold-soft); font-weight:700; margin:4px 0;
  }
  .next-prayer .countdown{
    font-size:1.6rem; font-weight:800; color:var(--cream); letter-spacing:1px;
    font-variant-numeric: tabular-nums;
  }

  .prayer-grid{
    display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;
  }
  .prayer-cell{
    text-align:center; padding:12px 4px; border-radius:12px;
    background:rgba(255,255,255,0.02);
    border:1px solid transparent;
    transition:all .3s ease;
  }
  .prayer-cell.active{
    border-color:var(--gold);
    background:rgba(204,154,63,0.12);
    box-shadow:0 0 18px rgba(204,154,63,0.25);
  }
  .prayer-cell .p-name{font-size:0.78rem; color:var(--muted); margin-bottom:4px;}
  .prayer-cell.active .p-name{color:var(--gold-soft);}
  .prayer-cell .p-time{font-size:1.05rem; font-weight:700; font-variant-numeric: tabular-nums;}

  /* quran section */
  .reciter-badge{
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-bottom:14px; color:var(--muted); font-size:0.85rem;
  }
  .reciter-badge b{color:var(--gold-soft); font-family:'Amiri', serif; font-size:1.05rem;}

  .search-box{
    width:100%; padding:11px 16px; border-radius:12px;
    background:rgba(0,0,0,0.2); border:1px solid var(--line);
    color:var(--cream); font-family:'Tajawal', sans-serif; font-size:0.9rem;
    margin-bottom:14px;
  }
  .search-box::placeholder{color:var(--muted);}
  .search-box:focus{outline:none; border-color:var(--gold-soft);}

  .surah-list{
    max-height:420px; overflow-y:auto;
    border-radius:14px;
    border:1px solid var(--line);
  }
  .surah-list::-webkit-scrollbar{width:6px;}
  .surah-list::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px;}

  .surah-row{
    display:flex; align-items:center; gap:12px;
    padding:11px 14px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    transition:background .2s;
  }
  .surah-row:last-child{border-bottom:none;}
  .surah-row:hover{background:rgba(224,184,105,0.06);}
  .surah-row.playing{background:rgba(204,154,63,0.14);}
  .surah-row .num{
    width:30px; height:30px; flex:none;
    border:1px solid var(--line); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:0.75rem; color:var(--muted);
  }
  .surah-row.playing .num{border-color:var(--gold); color:var(--gold-soft);}
  .surah-row .s-name{font-family:'Amiri', serif; font-size:1.05rem; flex:1;}
  .surah-row.playing .s-name{color:var(--gold-soft);}
  .surah-row .icon{width:16px; height:16px; opacity:0; flex:none;}
  .surah-row.playing .icon{opacity:1;}

  footer.note{
    text-align:center; color:var(--muted); font-size:0.72rem; margin:26px 0 10px; line-height:1.8;
  }

  /* sticky player */
  .player-bar{
    position:fixed; bottom:0; left:0; right:0; z-index:5;
    background:linear-gradient(0deg, var(--night) 60%, transparent);
    padding:16px 14px calc(14px + env(safe-area-inset-bottom));
  }
  .player-inner{
    max-width:600px; margin:0 auto;
    background:linear-gradient(180deg, var(--panel), var(--night-2));
    border:1px solid var(--line);
    border-radius:16px;
    padding:12px 16px;
    box-shadow:0 -6px 24px rgba(0,0,0,0.4);
    display:none;
  }
  .player-inner.show{display:block;}
  .player-top{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;
  }
  .player-info .cur-name{font-family:'Amiri', serif; color:var(--gold-soft); font-size:1.05rem;}
  .player-info .cur-sub{font-size:0.72rem; color:var(--muted);}
  .controls{display:flex; align-items:center; gap:14px;}
  .controls button{
    background:none; border:none; cursor:pointer; color:var(--cream);
    display:flex; align-items:center; justify-content:center;
  }
  .controls svg{width:22px; height:22px;}
  .play-btn{
    width:42px; height:42px; border-radius:50%;
    background:var(--gold); color:var(--night) !important;
  }
  .play-btn svg{width:20px; height:20px;}
  .progress-row{display:flex; align-items:center; gap:8px; font-size:0.7rem; color:var(--muted); font-variant-numeric: tabular-nums;}
  .progress-track{
    flex:1; height:5px; border-radius:3px; background:rgba(255,255,255,0.1); position:relative; cursor:pointer;
  }
  .progress-fill{
    position:absolute; right:0; top:0; height:100%; border-radius:3px;
    background:linear-gradient(to left, var(--gold-soft), var(--gold));
    width:0%;
  }

  @media (max-width:380px){
    .prayer-grid{grid-template-columns:repeat(2,1fr);}
  }

  /* ============ أذكار الصباح والمساء ============ */
  .azkar-tabs{
    display:flex; flex-direction:column; gap:8px; margin-bottom:0;
  }
  .azkar-tab{
    display:flex; align-items:center; justify-content:space-between;
    width:100%; text-align:right; padding:14px 16px; border-radius:12px;
    background:rgba(0,0,0,0.2); border:1px solid var(--line); cursor:pointer;
    font-family:'Tajawal', sans-serif; font-weight:700; font-size:0.95rem;
    color:var(--cream); transition:all .25s ease;
  }
  .azkar-tab .chev{width:18px; height:18px; color:var(--muted); transition:transform .25s ease;}
  .azkar-tab.active{
    background:linear-gradient(180deg, var(--panel), var(--night-2));
    border-color:var(--gold);
  }
  .azkar-tab.active .chev{transform:rotate(180deg); color:var(--gold-soft);}
  .azkar-tab + .azkar-tab{margin-top:2px;}

  .azkar-panel{
    max-height:0; overflow:hidden;
    transition:max-height .35s ease;
  }
  .azkar-panel.open{max-height:6000px;}

  .azkar-progress{
    display:flex; align-items:center; gap:10px; margin:16px 0 16px;
  }
  .azkar-progress .bar{
    flex:1; height:7px; border-radius:4px; background:rgba(255,255,255,0.08); overflow:hidden;
  }
  .azkar-progress .bar-fill{
    height:100%; border-radius:4px;
    background:linear-gradient(to left, var(--gold-soft), var(--gold));
    width:0%; transition:width .3s ease;
  }
  .azkar-progress .count-txt{
    font-size:0.75rem; color:var(--muted); white-space:nowrap; font-variant-numeric: tabular-nums;
  }
  .azkar-reset{
    background:none; border:1px solid var(--line); color:var(--muted);
    padding:5px 12px; border-radius:8px; font-family:inherit; font-size:0.72rem; cursor:pointer; white-space:nowrap;
  }
  .azkar-reset:hover{color:var(--gold-soft); border-color:var(--gold-soft);}

  const d = new Date();
  return `azkar_${mode}_${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function loadAzkarState(mode){
  const src = mode === 'sabah' ? AZKAR_SABAH : AZKAR_MASAA;
  const saved = localStorage.getItem(todayKey(mode));
  if(saved){
    try{ return JSON.parse(saved); }catch(e){}
  }
  return src.map(z => z.count);
}

function saveAzkarState(mode){
  localStorage.setItem(todayKey(mode), JSON.stringify(azkarState[mode]));
}

azkarState.sabah = loadAzkarState('sabah');
azkarState.masaa = loadAzkarState('masaa');

function renderAzkar(){
  const src = azkarMode === 'sabah' ? AZKAR_SABAH : AZKAR_MASAA;
  const remaining = azkarState[azkarMode];
  azkarListEl.innerHTML = '';
  src.forEach((z, i) => {
    const left = remaining[i];
    const done = left <= 0;
    const item = document.createElement('div');
    item.className = 'azkar-item' + (done ? ' done' : '');
    item.innerHTML = `
      <div class="a-text">${z.text}</div>
      ${z.virtue ? `<div class="a-virtue">${z.virtue}</div>` : ''}
      <div class="a-foot">
        <div class="a-hint">${done ? 'تم' : 'اضغط للعدّ'}</div>
        <div class="a-counter">${Math.max(left,0)}</div>
      </div>
    `;
    item.addEventListener('click', () => {
      if(remaining[i] > 0){
        remaining[i]--;
        saveAzkarState(azkarMode);
        renderAzkar();
      }
    });
    azkarListEl.appendChild(item);
  });
  updateAzkarProgress();
}

function updateAzkarProgress(){
  const src = azkarMode === 'sabah' ? AZKAR_SABAH : AZKAR_MASAA;
  const remaining = azkarState[azkarMode];
  const total = src.length;
  const completed = remaining.filter(v => v <= 0).length;
  azkarCountTxt.textContent = `${completed} / ${total}`;
  azkarBarFill.style.width = (total ? (completed/total*100) : 0) + '%';
}

function openAzkarTab(mode){
  if(azkarMode === mode && azkarOpen){
    azkarOpen = false;
  }else{
    azkarMode = mode;
    azkarOpen = true;
  }
  tabSabah.classList.toggle('active', azkarMode === 'sabah' && azkarOpen);
  tabMasaa.classList.toggle('active', azkarMode === 'masaa' && azkarOpen);
  azkarPanel.classList.toggle('open', azkarOpen);
  renderAzkar();
}

tabSabah.addEventListener('click', () => openAzkarTab('sabah'));
tabMasaa.addEventListener('click', () => openAzkarTab('masaa'));

azkarResetBtn.addEventListener('click', () => {
  const src = azkarMode === 'sabah' ? AZKAR_SABAH : AZKAR_MASAA;
  azkarState[azkarMode] = src.map(z => z.count);
  saveAzkarState(azkarMode);
  renderAzkar();
});

renderAzkar();

/* ============ بيانات السور ============ */
const SURAHS = [
"الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس",
"هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه",
"الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم",
"لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر",
"فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق",
"الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة",
"الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج",
"نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس",
"التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد",
"الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات",
"القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر",
"المسد","الإخلاص","الفلق","الناس"
];
const RECITERS = [
  {name:"بدر التركي", base:"https://server10.mp3quran.net/bader/Rewayat-Hafs-A-n-Assem/"},
  {name:"عبدالرحمن السديس", base:"https://server11.mp3quran.net/sds/"},
  {name:"سعود الشريم", base:"https://server7.mp3quran.net/shur/"},
  {name:"ماهر المعيقلي", base:"https://server12.mp3quran.net/maher/"},
  {name:"مشاري العفاسي", base:"https://server8.mp3quran.net/afs/"},
  {name:"أحمد العجمي", base:"https://server10.mp3quran.net/ajm/"},
  {name:"سعد الغامدي", base:"https://server7.mp3quran.net/s_gmd/"},
  {name:"علي جابر", base:"https://server11.mp3quran.net/a_jbr/"},
];
let currentReciterIndex = 0;
let RECITER_BASE = RECITERS[0].base;

/* ============ عناصر الصفحة ============ */
const surahListEl = document.getElementById('surahList');
const searchBox = document.getElementById('searchBox');
const audio = document.getElementById('audio');
const playerInner = document.getElementById('playerInner');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const curName = document.getElementById('curName');
const curSub = document.getElementById('curSub');
const progressFill = document.getElementById('progressFill');
const progressTrack = document.getElementById('progressTrack');
const curTimeEl = document.getElementById('curTime');
const durTimeEl = document.getElementById('durTime');
const reciterBtn = document.getElementById('reciterBtn');
const reciterPanel = document.getElementById('reciterPanel');
const reciterList = document.getElementById('reciterList');
const reciterCur = document.getElementById('reciterCur');

let currentIndex = null;
let isPlaying = false;

function renderReciterList(){
  reciterList.innerHTML = "";
  RECITERS.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'reciter-row' + (i === currentReciterIndex ? ' active' : '');
    row.innerHTML = `
      <span class="r-name">${r.name}</span>
      <svg class="r-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
    `;
    row.addEventListener('click', () => {
      currentReciterIndex = i;
      RECITER_BASE = r.base;
      reciterCur.textContent = r.name;
      curSub.textContent = r.name;
      renderReciterList();
      reciterBtn.classList.remove('open');
      reciterPanel.classList.remove('open');
      if(currentIndex !== null){
        loadSurah(currentIndex, isPlaying);
      }
    });
    reciterList.appendChild(row);
  });
}
renderReciterList();

reciterBtn.addEventListener('click', () => {
  reciterBtn.classList.toggle('open');
  reciterPanel.classList.toggle('open');
});

function pad(n){ return n.toString().padStart(3,'0'); }
function fmtTime(s){
  if(!isFinite(s)) return "0:00";
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ":" + sec.toString().padStart(2,'0');
}

function renderSurahList(filter=""){
  surahListEl.innerHTML = "";
  SURAHS.forEach((name, i) => {
    if(filter && !name.includes(filter)) return;
    const row = document.createElement('div');
    row.className = 'surah-row' + (currentIndex===i ? ' playing' : '');
    row.innerHTML = `
      <div class="num">${i+1}</div>
      <div class="s-name">سورة ${name}</div>
      <svg class="icon" viewBox="0 0 24 24" fill="#e0b869"><path d="M8 5v14l11-7z"/></svg>
    `;
    row.addEventListener('click', () => loadSurah(i, true));
    surahListEl.appendChild(row);
  });
}
renderSurahList();

searchBox.addEventListener('input', e => renderSurahList(e.target.value.trim()));

function loadSurah(index, autoplay){
  currentIndex = index;
  audio.src = RECITER_BASE + pad(index+1) + ".mp3";
  curName.textContent = "سورة " + SURAHS[index];
  playerInner.classList.add('show');
  renderSurahList(searchBox.value.trim());
  if(autoplay){
    audio.play().then(()=>{ isPlaying = true; updatePlayIcon(); }).catch(()=>{});
  }
}

function updatePlayIcon(){
  playIcon.innerHTML = isPlaying
    ? '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

playBtn.addEventListener('click', () => {
  if(currentIndex === null){ loadSurah(0, true); return; }
  if(isPlaying){ audio.pause(); isPlaying=false; }
  else { audio.play(); isPlaying=true; }
  updatePlayIcon();
});

prevBtn.addEventListener('click', () => {
  if(currentIndex === null) return;
  const i = (currentIndex - 1 + SURAHS.length) % SURAHS.length;
  loadSurah(i, true);
});
nextBtn.addEventListener('click', () => {
  if(currentIndex === null) return;
  const i = (currentIndex + 1) % SURAHS.length;
  loadSurah(i, true);
});
audio.addEventListener('ended', () => nextBtn.click());

audio.addEventListener('timeupdate', () => {
  if(audio.duration){
    progressFill.style.width = (audio.currentTime/audio.duration*100) + "%";
    curTimeEl.textContent = fmtTime(audio.currentTime);
  }
});
audio.addEventListener('loadedmetadata', () => {
  durTimeEl.textContent = fmtTime(audio.duration);
});
progressTrack.addEventListener('click', (e) => {
  const rect = progressTrack.getBoundingClientRect();
  // RTL: right side = 0%, left side = 100% -> but time flows normally, so invert x
  const ratio = 1 - ((e.clientX - rect.left) / rect.width);
  if(audio.duration) audio.currentTime = ratio * audio.duration;
});

/* ============ أوقات الصلاة ============ */
const cityNameEl = document.getElementById('cityName');
const hijriDateEl = document.getElementById('hijriDate');
const prayerGridEl = document.getElementById('prayerGrid');
const nextNameEl = document.getElementById('nextName');
const countdownEl = document.getElementById('countdown');
const locBtn = document.getElementById('locBtn');

const PRAYER_LABELS = {Fajr:"الفجر", Sunrise:"الشروق", Dhuhr:"الظهر", Asr:"العصر", Maghrib:"المغرب", Isha:"العشاء"};
let timingsData = null;
let countdownTimer = null;

async function fetchTimings(lat, lon, cityLabel){
  cityNameEl.textContent = "جارٍ التحميل...";
  try{
    const res = await fetch(`https://api.aladhan.com/v1/timings/${Math.floor(Date.now()/1000)}?latitude=${lat}&longitude=${lon}&method=4`);
    const json = await res.json();
    timingsData = json.data;
    cityNameEl.textContent = cityLabel;
    renderTimings();
  }catch(err){
    cityNameEl.textContent = "تعذّر جلب المواقيت";
  }
}

function renderTimings(){
  if(!timingsData) return;
  const t = timingsData.timings;
  hijriDateEl.textContent = `${timingsData.date.hijri.weekday.ar} ${timingsData.date.hijri.day} ${timingsData.date.hijri.month.ar} ${timingsData.date.hijri.year}هـ`;

  prayerGridEl.innerHTML = "";
  const order = ["Fajr","Sunrise","Dhuhr","Asr","Maghrib","Isha"];
  order.forEach(key => {
    const cell = document.createElement('div');
    cell.className = 'prayer-cell';
    cell.dataset.key = key;
    cell.innerHTML = `<div class="p-name">${PRAYER_LABELS[key]}</div><div class="p-time">${t[key]}</div>`;
    prayerGridEl.appendChild(cell);
  });

  updateNextPrayer();
  if(countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(updateNextPrayer, 1000);
}

function parseTimeToday(hhmm){
  const [h,m] = hhmm.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d;
}

function updateNextPrayer(){
  if(!timingsData) return;
  const t = timingsData.timings;
  const order = ["Fajr","Sunrise","Dhuhr","Asr","Maghrib","Isha"];
  const now = new Date();
  let next = null, nextTime = null;

  for(const key of order){
    const time = parseTimeToday(t[key]);
    if(time > now){ next = key; nextTime = time; break; }
  }
  if(!next){
    // بعد العشاء: القادمة فجر الغد
    next = "Fajr";
    nextTime = parseTimeToday(t.Fajr);
    nextTime.setDate(nextTime.getDate()+1);
  }

  nextNameEl.textContent = PRAYER_LABELS[next];
  const diff = Math.max(0, nextTime - now);
  const hh = Math.floor(diff/3600000);
  const mm = Math.floor((diff%3600000)/60000);
  const ss = Math.floor((diff%60000)/1000);
  countdownEl.textContent = `${hh.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`;

  document.querySelectorAll('.prayer-cell').forEach(c=>{
    c.classList.toggle('active', c.dataset.key === next);
  });
}

function useRiyadhDefault(){
  fetchTimings(24.7136, 46.6753, "الرياض (افتراضي)");
}

function tryGeolocation(){
  if(!navigator.geolocation){ useRiyadhDefault(); return; }
  navigator.geolocation.getCurrentPosition(
    pos => fetchTimings(pos.coords.latitude, pos.coords.longitude, "موقعك الحالي"),
    () => useRiyadhDefault(),
    { timeout: 6000 }
  );
}

locBtn.addEventListener('click', tryGeolocation);
tryGeolocation();
</script>
